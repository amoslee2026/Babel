// Verilator lint configuration for ASAP7 design rules
// Suppress expected warnings for 7nm PDK patterns
-Wno-WIDTH          // Allow wide buses for ASAP7 standard cells
-Wno-UNUSEDPIN      // Allow unused pins on standard cell instances
-Wno-CASEINCOMPLETE // Allow case statements without default (common in FSMs)
-Wno-IMPLICIT       // Allow implicit state transitions
-Wno-modname        // Suppress warnings about ASAP7 library cells
-Warn-lint          // Enable strict checks for design quality
-Warn-CDC           // Warn on potential CDC issues
-Warn-UNUSED        // Warn on unused signals
-Warn-UNDRIVEN      // Warn on undriven signals
