# Verible rules_config for Babel ASAP7 SystemVerilog RTL
# Used via:  verible-verilog-lint --rules_config=asap7_rules.cfg <files>
#
# Format (per Verible documentation): one rule per line.
#   -rule-name              disable a rule
#   +rule-name              enable a rule
#   -rule-name=param:value  disable / configure with a parameter
# Lines starting with '#' are comments; blank lines are ignored.
#
# Intent (ported from the previous Verilator config):
#   The Verilator version waived WIDTH / UNUSEDPIN / CASEINCOMPLETE / IMPLICIT
#   / modname style noise that is expected for synthesizable ASAP7 7nm RTL,
#   while keeping real lint enabled. Verible has no width/unused-pin lint rules
#   (those are elaboration/simulation concerns handled by Verilator/Yosys, not
#   Verible's style linter), so the closest matching relaxations here are the
#   style rules that produce the same kind of noise on reused IP / CBB code.
#   Only rules confirmed to exist in the Verible lint catalog are listed;
#   everything else stays at Verible defaults (i.e. enabled).

# --- Relaxations (match the spirit of the prior Verilator waivers) ---
# Long auto-generated bus/expression lines are common in ASAP7 RTL.
-line-length
# Parameter naming in reused IP/CBBs is not always CamelCase/ALL_CAPS.
-parameter-name-style
# Reused CBBs may not match their filename to the module name.
-module-filename

# --- Kept enabled on purpose (cheap, high-signal quality checks) ---
+no-tabs
+no-trailing-spaces
