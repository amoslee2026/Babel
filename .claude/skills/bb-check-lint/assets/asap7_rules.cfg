# ASAP7 Lint Rules Configuration
# Verilator lint rules tuned for ASAP7 7nm design flow

# Severity: error | warning | info
[rules]
WIDTH            = error
UNUSED           = warning
UNOPTFLAT        = warning
BLKSEQ           = warning
COMBDLY          = error
MULTIDRIVEN      = error
LATCH            = warning
CASEINCOMPLETE   = error
CASEX            = error
IMPLICIT         = warning
PINMISSING       = error
DECLFILENAME     = info
VARHIDDEN        = info
STMTDLY          = error
SYNCASYNCNET     = warning
UNPACKED         = info

[waivers]
# Path to waiver file
waiver_file = assets/tb_waiver.vbl

[asap7_specific]
# Max fanout for ASAP7 6-track cells
max_fanout = 32
# Max transition time (ps)
max_transition = 50
# Clock tree depth limit
max_clock_depth = 8
